$schema: https://json-schema.org/draft/2020-12/schema
$id: AnthropicMessagesResponse.yaml
type: object
properties:
  id:
    type: string
    description: Unique response identifier
  type:
    type: string
    const: message
    description: Object type (always 'message')
  role:
    type: string
    const: assistant
    description: The role of the response (always 'assistant')
  content:
    type: array
    items: {}
    description: Array of content blocks in the response (AnthropicTextBlock | AnthropicToolUseBlock)
  model:
    type: string
    description: The model that generated the response
  stop_reason:
    type: string
    description: The reason generation stopped ('end_turn', 'max_tokens', 'stop_sequence', 'tool_use')
  usage:
    $ref: AnthropicUsage.yaml
    description: Token usage statistics
required:
  - id
  - type
  - role
  - content
  - model
  - stop_reason
  - usage
description: The response body from the Anthropic Messages API.
