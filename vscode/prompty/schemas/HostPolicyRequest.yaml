$schema: https://json-schema.org/draft/2020-12/schema
$id: HostPolicyRequest.yaml
type: object
properties:
  sessionId:
    type: string
    description: Stable session identifier
  turnId:
    type: string
    description: Stable turn identifier
  iteration:
    type: integer
    minimum: -2147483648
    maximum: 2147483647
    description: Zero-based model loop iteration
  messages:
    type: array
    items:
      $ref: Message.yaml
    default: []
    description: Canonical messages entering the invocation
  stablePrefixMessages:
    type: integer
    minimum: -2147483648
    maximum: 2147483647
    default: 0
    description: Number of leading messages eligible for provider prefix-cache reuse
  inputs:
    description: Turn inputs
required:
  - sessionId
  - turnId
  - iteration
  - messages
  - stablePrefixMessages
description: Host-owned deterministic state supplied before one model invocation.
