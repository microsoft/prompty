$schema: https://json-schema.org/draft/2020-12/schema
$id: MemoryEntry.yaml
type: object
properties:
  content:
    type: string
    default: ""
    description: The memory content
  category:
    $ref: MemoryCategory.yaml
    description: The classification of the memory
  createdAt:
    type: string
    description: ISO 8601 UTC timestamp when the memory was created; consumed as a recency input by recall
  tags:
    type: array
    items:
      type: string
    description: General labels for the memory; consumed as keyword inputs by recall
  importance:
    type: number
    description: Optional salience weight in the range 0..1; consumed as a ranking input by recall
  metadata:
    $ref: RecordUnknown.yaml
    default: {}
    description: Opaque host-specific memory metadata (e.g. source, session association, raw application taxonomy, stable per-entry id, or a stored embedding vector for host-side vector recall)
required:
  - content
  - category
description: |-
  A single agent memory.

  The canonical, host-neutral unit of agent memory. `content` is the memory
  text; `category` classifies it; `createdAt`, `tags`, and `importance` are
  intrinsic scoring inputs consumed by deterministic recall. Any host-specific
  bookkeeping (source, session association, application taxonomy, a stored
  embedding vector for host-side vector recall, or a stable per-entry
  identifier) lives in `metadata`, never as a canonical field.
