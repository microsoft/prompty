$schema: https://json-schema.org/draft/2020-12/schema
$id: Prompty.yaml
type: object
properties:
  name:
    type: string
    default: ""
    description: Human-readable name of the prompt
  displayName:
    type: string
    default: ""
    description: Display name for UI purposes
  description:
    type: string
    default: ""
    description: Description of the prompt's purpose
  metadata:
    $ref: RecordUnknown.yaml
    default: {}
    description: Additional metadata including authors, tags, and other arbitrary properties
  inputs:
    anyOf:
      - $ref: RecordProperty.yaml
      - type: array
        items:
          type: object
          properties:
            name:
              type: string
              default: ""
              description: Name of the property
            kind:
              anyOf:
                - type: string
                  const: string
                - type: string
                  const: integer
                - type: string
                  const: float
                - type: string
                  const: boolean
                - type: string
                  const: array
                - type: string
                  const: object
                - type: string
                  const: thread
                - type: string
                  const: image
                - type: string
                  const: audio
                - type: string
                  const: file
              description: The data type of the input property
            description:
              type: string
              default: ""
              description: A short description of the input property
            required:
              type: boolean
              default: false
              description: Whether the property is required
            default:
              default: null
              description: The default value of the property - this represents the default value if none is provided
            example:
              default: null
              description: Example value used for either initialization or tooling
            enumValues:
              type: array
              items: {}
              default: []
              description: Allowed enumeration values for the property
          required:
            - name
            - kind
    description: Input parameters that participate in template rendering
  outputs:
    anyOf:
      - $ref: RecordProperty.yaml
      - type: array
        items:
          type: object
          properties:
            name:
              type: string
              default: ""
              description: Name of the property
            kind:
              anyOf:
                - type: string
                  const: string
                - type: string
                  const: integer
                - type: string
                  const: float
                - type: string
                  const: boolean
                - type: string
                  const: array
                - type: string
                  const: object
                - type: string
                  const: thread
                - type: string
                  const: image
                - type: string
                  const: audio
                - type: string
                  const: file
              description: The data type of the input property
            description:
              type: string
              default: ""
              description: A short description of the input property
            required:
              type: boolean
              default: false
              description: Whether the property is required
            default:
              default: null
              description: The default value of the property - this represents the default value if none is provided
            example:
              default: null
              description: Example value used for either initialization or tooling
            enumValues:
              type: array
              items: {}
              default: []
              description: Allowed enumeration values for the property
          required:
            - name
            - kind
    description: Expected output format and structure
  model:
    anyOf:
      - $ref: Model.yaml
      - type: string
    description: AI model configuration
  tools:
    anyOf:
      - $ref: RecordTool.yaml
      - type: array
        items:
          type: object
          properties:
            name:
              type: string
              default: ""
              description: Name of the tool. If a function tool, this is the function name, otherwise it is the type
            kind:
              $ref: ToolTypes.yaml
              description: The kind identifier for the tool
            description:
              type: string
              default: ""
              description: A short description of the tool for metadata purposes
            bindings:
              anyOf:
                - $ref: RecordBinding.yaml
                - type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                        default: ""
                        description: Name of the binding
                      input:
                        type: string
                        description: The input property that will be bound to the tool parameter argument
                    required:
                      - name
                      - input
              default: []
              description: Tool argument bindings to input properties
          required:
            - name
            - kind
    default: []
    description: Tools available for extended functionality
  template:
    $ref: Template.yaml
    description: Template configuration for prompt rendering
  instructions:
    type: string
    default: ""
    description: Clear directions on what the prompt should do. In .prompty files, this comes from the markdown body.
required:
  - name
  - model
description: |-
  A Prompty is a markdown file format for LLM prompts. The frontmatter defines
  structured metadata including model configuration, input/output schemas, tools,
  and template settings. The markdown body becomes the instructions.

  This is the single root type for the Prompty schema — there is no abstract base
  class or kind discriminator. A .prompty file always produces a Prompty instance.
additionalProperties: false
