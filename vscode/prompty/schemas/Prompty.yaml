# Prompty v2 Frontmatter Schema
# Based on AgentSchema v1.0 (https://github.com/microsoft/AgentSchema)
# Supports both full object syntax and string shorthand constructions.

$schema: "http://json-schema.org/draft-07/schema#"
$id: "https://prompty.ai/schemas/v2/Prompty.yaml"
title: Prompty v2 Frontmatter Schema
description: >-
  Schema for .prompty file frontmatter based on the AgentSchema v1.0
  PromptAgent specification. Supports shorthand string syntax for
  model, format, parser, and other fields.

type: object
required:
  - name

properties:
  # --- AgentDefinition properties ---
  $schema:
    type: string
    description: Optional reference to this schema for editor validation.

  kind:
    type: string
    description: Agent kind (defaults to 'prompt' for .prompty files).
    default: prompt
    enum:
      - prompt
      - hosted
      - workflow

  name:
    type: string
    description: Human-readable name of the agent.

  displayName:
    type: string
    description: Display name for UI purposes.

  description:
    type: string
    description: Description of the agent's capabilities and purpose.

  metadata:
    type: object
    additionalProperties: true
    description: >-
      Additional metadata including authors, tags, and other arbitrary
      key-value pairs.

  inputSchema:
    $ref: "#/definitions/propertySchema"
    description: Input parameters that participate in template rendering.

  outputSchema:
    $ref: "#/definitions/propertySchema"
    description: Expected output format and structure from the agent.

  # --- PromptAgent properties ---
  model:
    description: >-
      AI model configuration. String shorthand expands to {id: <value>}
      (e.g. "gpt-4o" becomes {id: "gpt-4o"}).
    anyOf:
      - type: string
        description: Model ID shorthand (e.g. "gpt-4o", "claude-3-sonnet").
      - $ref: "#/definitions/model"

  tools:
    description: Tools available to the agent for extended functionality.
    type: array
    items:
      $ref: "#/definitions/tool"
    default: []

  template:
    $ref: "#/definitions/template"
    description: Template configuration for prompt rendering.

  instructions:
    type: string
    description: >-
      Give your agent clear directions on what to do and how to do it.
      Include specific tasks, their order, and any special instructions.

  additionalInstructions:
    type: string
    description: >-
      Additional instructions or context for the agent, used to provide
      extra guidance.

# ---------------------------------------------------------------------------
# Reusable type definitions (aligned with AgentSchema v1.0)
# ---------------------------------------------------------------------------
definitions:

  # ── Model ────────────────────────────────────────────────────────────────
  model:
    type: object
    description: Full model configuration including provider, connection, and options.
    required:
      - id
    properties:
      id:
        type: string
        description: Model identifier (e.g. "gpt-4o", "claude-3-opus").
      provider:
        type: string
        description: >-
          The model provider (e.g. 'openai', 'azure', 'anthropic').
        enum:
          - openai
          - azure
          - anthropic
      apiType:
        type: string
        description: >-
          The API type to use for the model (e.g. 'chat', 'responses').
          Common values are 'chat' and 'responses', but any string is accepted.
        enum:
          - chat
          - responses
      connection:
        $ref: "#/definitions/connection"
        description: Connection details for authenticating with the model endpoint.
      options:
        $ref: "#/definitions/modelOptions"
        description: Model inference options (temperature, tokens, etc.).

  # ── Connection ──────────────────────────────────────────────────────────
  connection:
    type: object
    description: >-
      Connection configuration for the model endpoint. Discriminated
      by the "kind" field. Supports key, reference, remote, and
      anonymous authentication modes.
    properties:
      kind:
        type: string
        description: Authentication kind.
        enum:
          - key
          - reference
          - remote
          - anonymous
      authenticationMode:
        type: string
        description: Authority level for the connection.
        default: system
        enum:
          - user
          - system
      usageDescription:
        type: string
        description: Context on how this connection will be used.
      endpoint:
        type: string
        description: Base URL of the AI service endpoint.
      apiKey:
        type: string
        description: >-
          API key for authentication. Supports ${env:VAR} references
          (e.g. "${env:OPENAI_API_KEY}").
      name:
        type: string
        description: Name of the registered connection (for reference kind).
    additionalProperties: true

  # ── Model Options ───────────────────────────────────────────────────────
  modelOptions:
    type: object
    description: >-
      Parameters that control model inference behaviour. Unknown
      properties are passed through to the provider as-is.
    additionalProperties: true
    properties:
      kind:
        type: string
        description: Discriminator for model options.
      temperature:
        type: number
        description: Sampling temperature. 0 means deterministic.
      topP:
        type: number
        description: Nucleus sampling probability (0–1).
      topK:
        type: integer
        description: Top-K sampling – only the K most likely tokens are considered.
      maxOutputTokens:
        type: integer
        description: Maximum number of tokens to generate in the response.
      frequencyPenalty:
        type: number
        description: Penalise tokens based on how often they have appeared so far.
      presencePenalty:
        type: number
        description: Penalise tokens based on whether they have appeared at all.
      seed:
        type: integer
        description: Seed for deterministic sampling.
      stopSequences:
        type: array
        description: Sequences that cause the model to stop generating.
        items:
          type: string
      allowMultipleToolCalls:
        type: boolean
        description: Whether to allow multiple tool calls in a single response.

  # ── Property Schema (inputSchema / outputSchema) ────────────────────────
  propertySchema:
    type: object
    description: >-
      Describes a set of typed properties, used for both inputSchema and
      outputSchema as well as tool parameter definitions. Properties can
      be an array of named objects or a record (object with property
      name keys).
    properties:
      properties:
        description: Property definitions (array or record form).
        anyOf:
          - type: array
            items:
              $ref: "#/definitions/property"
          - type: object
            additionalProperties:
              $ref: "#/definitions/property"
      examples:
        type: array
        description: Example records for the input schema.
        items:
          type: object
          additionalProperties: true
      strict:
        type: boolean
        default: false
        description: >-
          When true, the schema is enforced strictly (only defined
          properties are allowed).
    required:
      - properties

  # ── Property ────────────────────────────────────────────────────────────
  property:
    type: object
    description: A single typed property definition.
    required:
      - name
      - kind
    properties:
      name:
        type: string
        description: Property name (used as the key in input/output objects).
      kind:
        type: string
        description: >-
          The data type of the property.
        enum:
          - string
          - integer
          - float
          - boolean
          - array
          - object
      description:
        type: string
        description: Human-readable description of the property.
      required:
        type: boolean
        default: false
        description: Whether the caller must provide this property.
      default:
        description: Default value used when the caller does not supply one.
      example:
        description: Example value used for initialization or tooling.
      enumValues:
        type: array
        description: >-
          Allowed enumeration values for the property.
        items: {}

  # ── Template ────────────────────────────────────────────────────────────
  template:
    type: object
    description: >-
      Template configuration for prompt rendering. Both format and
      parser support string shorthand that expands to {kind: <value>}.
    required:
      - format
      - parser
    properties:
      format:
        description: >-
          Template rendering engine. String shorthand (e.g. "jinja2")
          expands to {kind: "jinja2"}.
        anyOf:
          - type: string
            enum:
              - jinja2
              - mustache
              - handlebars
              - nunjucks
          - $ref: "#/definitions/format"
      parser:
        description: >-
          Parser for processing the rendered template into API-compatible
          format. String shorthand (e.g. "prompty") expands to {kind: "prompty"}.
        anyOf:
          - type: string
            enum:
              - prompty
              - plain
          - $ref: "#/definitions/parser"

  format:
    type: object
    description: Template format definition.
    required:
      - kind
    properties:
      kind:
        type: string
        default: "*"
        description: Template rendering engine (e.g. 'jinja2', 'mustache').
        enum:
          - jinja2
          - mustache
          - handlebars
          - nunjucks
      strict:
        type: boolean
        default: false
        description: Whether the template can emit structural text for parsing output.
      options:
        type: object
        additionalProperties: true
        description: Options for the template engine.

  parser:
    type: object
    description: Template parser definition.
    required:
      - kind
    properties:
      kind:
        type: string
        default: "*"
        description: Parser kind (e.g. 'prompty').
        enum:
          - prompty
          - plain
      options:
        type: object
        additionalProperties: true
        description: Options for the parser.

  # ── Tool ────────────────────────────────────────────────────────────────
  tool:
    type: object
    description: >-
      A tool the model can invoke during execution. Discriminated by "kind".
    required:
      - name
      - kind
    properties:
      name:
        type: string
        description: >-
          Tool name. For function tools this is the function name,
          otherwise it is the type identifier.
      kind:
        type: string
        description: >-
          Tool kind identifier.
        enum:
          - function
          - openapi
          - mcp
          - custom
          - web_search
          - file_search
          - code_interpreter
      description:
        type: string
        description: Short description of the tool.
      bindings:
        description: Tool argument bindings to input properties.
        anyOf:
          - type: array
            items:
              $ref: "#/definitions/binding"
          - type: object
            additionalProperties:
              $ref: "#/definitions/binding"
        default: []
      # Function tool properties
      parameters:
        $ref: "#/definitions/propertySchema"
        description: Schema for the function's input parameters (function tools).
      strict:
        type: boolean
        description: >-
          When true, the model must produce arguments that exactly match
          the parameter schema (function tools, OpenAI strict mode).
      # OpenAPI / MCP tool properties
      connection:
        $ref: "#/definitions/connection"
        description: Connection configuration for the tool.
      specification:
        type: string
        description: >-
          Path or URL to the OpenAPI specification (openapi tools).
          Relative paths are resolved from the .prompty file location.
      serverName:
        type: string
        description: Name of the MCP server providing this tool (mcp tools).
      serverDescription:
        type: string
        description: Description of the MCP server (mcp tools).
    additionalProperties: true

  # ── Binding ─────────────────────────────────────────────────────────────
  binding:
    type: object
    description: Binds a tool parameter to an input property.
    required:
      - name
      - input
    properties:
      name:
        type: string
        description: Name of the binding.
      input:
        type: string
        description: The input property that will be bound to the tool parameter argument.
