# JSON Schema for the Prompty v2 frontmatter format.
# Validates the YAML block between --- delimiters in .prompty files.

$schema: "http://json-schema.org/draft-07/schema#"
$id: "https://prompty.ai/schemas/v2/Prompty.yaml"
title: Prompty v2 frontmatter schema
description: >-
  Defines the structure of the YAML frontmatter in a .prompty file.
  The frontmatter configures the prompt name, model, inputs, outputs,
  template engine, and tool definitions for the Prompty runtime.

type: object
required:
  - name
additionalProperties: false

properties:
  $schema:
    type: string
    description: Optional reference to this schema for editor validation.

  name:
    type: string
    description: Unique identifier for the prompt.

  description:
    type: string
    description: Human-readable description of what the prompt does.

  displayName:
    type: string
    description: Friendly display name shown in tooling and UIs.

  metadata:
    type: object
    additionalProperties: true
    description: >-
      Free-form metadata such as authors, tags, version, or any custom
      key-value pairs that describe the prompt.

  model:
    description: >-
      Model configuration. Can be a string shorthand (expands to {id: <value>})
      or a full model object.
    oneOf:
      - type: string
        description: Shorthand model identifier (e.g. "gpt-4o").
      - $ref: "#/definitions/model"

  inputSchema:
    $ref: "#/definitions/propertySchema"
    description: Schema describing the input parameters the prompt expects.

  outputSchema:
    $ref: "#/definitions/propertySchema"
    description: Schema describing the structured output the prompt produces.

  template:
    $ref: "#/definitions/template"
    description: Template engine and parser configuration.

  tools:
    type: array
    description: Tool definitions available to the model during execution.
    items:
      $ref: "#/definitions/tool"

# ---------------------------------------------------------------------------
# Reusable type definitions
# ---------------------------------------------------------------------------
definitions:

  # ── Model ────────────────────────────────────────────────────────────────
  model:
    type: object
    description: Full model configuration including provider, connection, and options.
    required:
      - id
    additionalProperties: false
    properties:
      id:
        type: string
        description: Model identifier (e.g. "gpt-4o", "claude-3-opus").
      provider:
        type: string
        description: The model provider.
        enum:
          - openai
          - azure
          - azure_serverless
          - anthropic
      apiType:
        type: string
        description: Which API surface to use when calling the model.
        default: chat
        enum:
          - chat
          - completion
          - embedding
          - image
      connection:
        $ref: "#/definitions/connection"
        description: Connection details for authenticating with the model endpoint.
      options:
        $ref: "#/definitions/modelOptions"
        description: Model inference options (temperature, tokens, etc.).

  # ── Connection (discriminated union on "kind") ──────────────────────────
  connection:
    description: >-
      Connection configuration, discriminated by the "kind" field.
      Use "key" for API-key based auth, "reference" to look up a
      pre-registered connection by name, or "anonymous" for
      unauthenticated / default-credential access.
    oneOf:
      - $ref: "#/definitions/apiKeyConnection"
      - $ref: "#/definitions/referenceConnection"
      - $ref: "#/definitions/anonymousConnection"

  apiKeyConnection:
    type: object
    description: >-
      Authenticate with an explicit API key and endpoint.
      Use ${env:VAR_NAME} syntax to reference environment variables.
    required:
      - kind
    additionalProperties: false
    properties:
      kind:
        type: string
        const: key
        description: Discriminator – must be "key".
      endpoint:
        type: string
        description: Base URL of the model endpoint.
      apiKey:
        type: string
        description: >-
          API key for authentication. Supports ${env:VAR} references
          (e.g. "${env:OPENAI_API_KEY}").

  referenceConnection:
    type: object
    description: Look up a pre-registered connection by name from the connection registry.
    required:
      - kind
      - name
    additionalProperties: false
    properties:
      kind:
        type: string
        const: reference
        description: Discriminator – must be "reference".
      name:
        type: string
        description: Name of the registered connection to use.

  anonymousConnection:
    type: object
    description: >-
      Use default or environment-provided credentials without explicit keys.
    required:
      - kind
    additionalProperties: false
    properties:
      kind:
        type: string
        const: anonymous
        description: Discriminator – must be "anonymous".
      endpoint:
        type: string
        description: Base URL of the model endpoint.

  # ── Model Options ───────────────────────────────────────────────────────
  modelOptions:
    type: object
    description: >-
      Parameters that control model inference behaviour. Unknown
      properties are passed through to the provider as-is.
    additionalProperties: true
    properties:
      temperature:
        type: number
        description: Sampling temperature. 0 means deterministic.
      topP:
        type: number
        description: Nucleus sampling probability (0–1).
      topK:
        type: number
        description: Top-K sampling – only the K most likely tokens are considered.
      maxOutputTokens:
        type: integer
        description: Maximum number of tokens to generate in the response.
      frequencyPenalty:
        type: number
        description: Penalise tokens based on how often they have appeared so far.
      presencePenalty:
        type: number
        description: Penalise tokens based on whether they have appeared at all.
      seed:
        type: integer
        description: >-
          Seed for deterministic sampling. Not guaranteed by all providers.
      stopSequences:
        type: array
        description: Sequences that cause the model to stop generating.
        items:
          type: string
      responseFormat:
        type: object
        description: >-
          Provider-specific response format object (e.g. {"type": "json_object"}).
        additionalProperties: true

  # ── Property Schema (inputSchema / outputSchema) ────────────────────────
  propertySchema:
    type: object
    description: >-
      Describes a set of typed properties, used for both inputSchema and
      outputSchema as well as tool parameter definitions.
    additionalProperties: false
    properties:
      properties:
        type: array
        description: List of property definitions.
        items:
          $ref: "#/definitions/property"
      examples:
        type: object
        description: >-
          Example values keyed by property name, used for testing and
          preview rendering.
        additionalProperties: true
      strict:
        type: boolean
        description: >-
          When true, the schema is enforced strictly (e.g. for structured
          output validation).

  # ── Property ────────────────────────────────────────────────────────────
  property:
    type: object
    description: A single typed property definition.
    required:
      - name
      - kind
    additionalProperties: false
    properties:
      name:
        type: string
        description: Property name (used as the key in input/output objects).
      kind:
        type: string
        description: >-
          The logical data type of the property. "thread" represents
          conversation history; "image", "audio", and "file" are rich
          content types handled specially by the renderer.
        enum:
          - string
          - number
          - integer
          - boolean
          - object
          - array
          - thread
          - image
          - audio
          - file
      description:
        type: string
        description: Human-readable description of the property.
      default:
        description: Default value used when the caller does not supply one.
      required:
        type: boolean
        description: Whether the caller must provide this property.
      enumValues:
        type: array
        description: >-
          Allowed values. Maps to "enum" in JSON Schema when converting
          to a wire-format function schema.
        items: {}

  # ── Template ────────────────────────────────────────────────────────────
  template:
    type: object
    description: Configuration for the template engine and body parser.
    additionalProperties: false
    properties:
      format:
        type: object
        description: Template rendering engine settings.
        additionalProperties: false
        properties:
          kind:
            type: string
            description: Which template engine to use.
            enum:
              - jinja2
              - mustache
              - nunjucks
          strict:
            type: boolean
            description: >-
              When true, undefined variables cause an error instead of
              rendering as empty.
          options:
            type: object
            description: Engine-specific options passed through to the renderer.
            additionalProperties: true
      parser:
        type: object
        description: Body parser settings.
        additionalProperties: false
        properties:
          kind:
            type: string
            description: Which parser to use for the prompt body.
            enum:
              - prompty
          options:
            type: object
            description: Parser-specific options.
            additionalProperties: true

  # ── Tool (discriminated union on "kind") ─────────────────────────────────
  tool:
    description: >-
      A tool the model can invoke during execution, discriminated by "kind".
    oneOf:
      - $ref: "#/definitions/functionTool"
      - $ref: "#/definitions/openApiTool"
      - $ref: "#/definitions/mcpTool"
      - $ref: "#/definitions/bingSearchTool"
      - $ref: "#/definitions/fileSearchTool"
      - $ref: "#/definitions/customTool"

  functionTool:
    type: object
    description: >-
      A function tool whose parameters are defined inline. Converted to the
      provider's function-calling wire format at execution time.
    required:
      - kind
      - name
    additionalProperties: false
    properties:
      kind:
        type: string
        const: function
        description: Discriminator – must be "function".
      name:
        type: string
        description: Function name exposed to the model.
      description:
        type: string
        description: Human-readable description of what the function does.
      parameters:
        $ref: "#/definitions/propertySchema"
        description: Schema for the function's input parameters.
      strict:
        type: boolean
        description: >-
          When true, the model must produce arguments that exactly match
          the parameter schema (OpenAI strict mode).

  openApiTool:
    type: object
    description: >-
      A tool backed by an OpenAPI specification. The runtime resolves
      operations from the spec and exposes them to the model.
    required:
      - kind
      - name
    additionalProperties: false
    properties:
      kind:
        type: string
        const: openapi
        description: Discriminator – must be "openapi".
      name:
        type: string
        description: Logical name for the tool.
      description:
        type: string
        description: Human-readable description of the API.
      connection:
        $ref: "#/definitions/connection"
        description: Connection used to call the API.
      specification:
        type: string
        description: >-
          Path or URL to the OpenAPI specification (JSON or YAML).
          Relative paths are resolved from the .prompty file location.

  mcpTool:
    type: object
    description: >-
      A tool provided by a Model Context Protocol (MCP) server.
    required:
      - kind
      - name
    additionalProperties: false
    properties:
      kind:
        type: string
        const: mcp
        description: Discriminator – must be "mcp".
      name:
        type: string
        description: Logical name for the tool.
      description:
        type: string
        description: Human-readable description of the MCP tool.
      connection:
        $ref: "#/definitions/connection"
        description: Connection used to reach the MCP server.
      serverName:
        type: string
        description: Name of the MCP server providing this tool.
      serverDescription:
        type: string
        description: Description of the MCP server.

  bingSearchTool:
    type: object
    description: A Bing web-search tool.
    required:
      - kind
      - name
    additionalProperties: false
    properties:
      kind:
        type: string
        const: bing_search
        description: Discriminator – must be "bing_search".
      name:
        type: string
        description: Tool name.
      description:
        type: string
        description: Description of the search tool.

  fileSearchTool:
    type: object
    description: A file-search / retrieval tool.
    required:
      - kind
      - name
    additionalProperties: false
    properties:
      kind:
        type: string
        const: file_search
        description: Discriminator – must be "file_search".
      name:
        type: string
        description: Tool name.
      description:
        type: string
        description: Description of the file search tool.

  customTool:
    type: object
    description: >-
      A custom tool with an arbitrary configuration. Use this for
      provider-specific or user-defined tool types.
    required:
      - kind
      - name
    additionalProperties: true
    properties:
      kind:
        type: string
        const: custom
        description: Discriminator – must be "custom".
      name:
        type: string
        description: Tool name.
      description:
        type: string
        description: Description of the custom tool.
