$schema: https://json-schema.org/draft/2020-12/schema
$id: ToolCallStartPayload.yaml
type: object
properties:
  id:
    type: string
    description: The unique identifier of the tool call
  name:
    type: string
    description: The name of the tool being called
  arguments:
    type: string
    description: The serialized JSON arguments for the tool call
required:
  - name
  - arguments
description: Payload for "tool_call_start" events — the LLM has requested a tool call.
