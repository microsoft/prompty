$schema: https://json-schema.org/draft/2020-12/schema
$id: PromptyTool.yaml
type: object
properties:
  kind:
    type: string
    const: prompty
    description: The kind identifier for prompty tools
  path:
    type: string
    description: Path to the child .prompty file, relative to the parent
  mode:
    type: string
    const: single
    default: single
    description: Execution mode. Only 'single' is supported; nested agent loops are not started from PromptyTool.
required:
  - kind
  - path
  - mode
allOf:
  - $ref: Tool.yaml
description: |-
  A tool that references another .prompty file to be invoked as a tool.

  The child prompty is executed as a single prompt invocation. Nested agent
  loops are intentionally not started from PromptyTool.
