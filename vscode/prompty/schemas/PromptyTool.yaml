$schema: https://json-schema.org/draft/2020-12/schema
$id: PromptyTool.yaml
type: object
properties:
  kind:
    type: string
    const: prompty
    description: The kind identifier for prompty tools
  path:
    type: string
    description: Path to the child .prompty file, relative to the parent
  mode:
    anyOf:
      - type: string
        const: single
      - type: string
        const: agentic
    default: single
    description: Execution mode — 'single' for single-shot invoke (default) or 'agentic' for sub-agent turn
required:
  - kind
  - path
allOf:
  - $ref: Tool.yaml
description: |-
  A tool that references another .prompty file to be invoked as a tool.

  In `single` mode (default), the child prompty is loaded, rendered, and
  executed with a single LLM call (invoke). In `agentic` mode, the child
  runs as a sub-agent via `turn()` with its own tool-calling loop.
