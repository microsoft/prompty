$schema: https://json-schema.org/draft/2020-12/schema
$id: PromptyTool.yaml
type: object
properties:
  kind:
    type: string
    const: prompty
    description: The kind identifier for prompty tools
  path:
    type: string
    description: Path to the child .prompty file, relative to the parent
required:
  - kind
  - path
allOf:
  - $ref: Tool.yaml
description: |-
  A tool that references another .prompty file to be invoked as a tool.

  The child prompty is loaded, rendered, and executed with a single LLM call
  (invoke). Apps that want agentic sub-agents should use `kind: function` tools
  and call `turn()` themselves.
