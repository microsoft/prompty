$schema: https://json-schema.org/draft/2020-12/schema
$id: ToolExecutionStartPayload.yaml
type: object
properties:
  requestId:
    type: string
    description: Stable host execution request identifier
  toolCallId:
    type: string
    description: Associated model tool call identifier, when available
  toolName:
    type: string
    description: Name of the host tool being executed
  arguments:
    $ref: RecordUnknown.yaml
    description: Tool arguments after host-side sanitization
  workingDirectory:
    type: string
    description: Working directory or execution scope for the tool
  redaction:
    $ref: RedactionMetadata.yaml
    description: Redaction state for sensitive argument fields
required:
  - toolName
description: |-
  Payload for "tool_execution_start" events — the host is about to execute a concrete tool request.

  This is distinct from "tool_call_start", which records the model requesting a tool.
  Tool execution events capture the harness-side action after policy and permission checks.
