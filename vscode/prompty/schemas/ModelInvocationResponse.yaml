$schema: https://json-schema.org/draft/2020-12/schema
$id: ModelInvocationResponse.yaml
type: object
properties:
  output:
    description: Provider-neutral final output when no additional tool calls are requested
  usage:
    $ref: InvocationUsage.yaml
    description: Complete cumulative token usage for this completed invocation, when available
  assistantMessages:
    type: array
    items:
      $ref: Message.yaml
    default: []
    description: Assistant messages to commit before tool results are made visible
  toolRequests:
    type: array
    items:
      $ref: ModelToolRequest.yaml
    default: []
    description: Tool requests returned by the provider
  nextContextState:
    $ref: InvocationContextState.yaml
    description: Provider-context state to carry into the next invocation
  metadata:
    $ref: RecordUnknown.yaml
    default: {}
    description: Opaque provider-specific response metadata
description: |-
  Provider-neutral result of a single model invocation.

  This is the live provider boundary. It is intentionally distinct from
  TurnModelResponse, which is the deterministic reference-runner callback.
