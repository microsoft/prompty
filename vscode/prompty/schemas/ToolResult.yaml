$schema: https://json-schema.org/draft/2020-12/schema
$id: ToolResult.yaml
type: object
properties:
  parts:
    type: array
    items:
      $ref: ContentPart.yaml
    description: The content parts of the tool result
  status:
    anyOf:
      - type: string
        const: success
      - type: string
        const: error
      - type: string
        const: cancelled
      - type: string
        const: timeout
    description: Semantic execution status for the tool result
  errorKind:
    type: string
    description: Stable machine-readable error category when status is not success
  errorMessage:
    type: string
    description: Human-readable error message when status is not success
  durationMs:
    type: number
    description: Tool execution duration in milliseconds
required:
  - parts
description: |-
  The result of a tool execution. Contains a list of content parts, enabling
  rich tool results (text, images, files, audio) rather than just strings.

  Implementations MUST support conversion from a plain string to a ToolResult
  containing a single TextPart for backward compatibility.
