$schema: https://json-schema.org/draft/2020-12/schema
$id: FunctionTool.yaml
type: object
properties:
  kind:
    type: string
    const: function
    description: The kind identifier for function tools
  parameters:
    anyOf:
      - $ref: RecordProperty.yaml
      - type: array
        items:
          type: object
          properties:
            name:
              type: string
              default: ""
              description: Name of the property
            kind:
              anyOf:
                - type: string
                  const: string
                - type: string
                  const: integer
                - type: string
                  const: float
                - type: string
                  const: boolean
                - type: string
                  const: array
                - type: string
                  const: object
                - type: string
                  const: thread
                - type: string
                  const: image
                - type: string
                  const: audio
                - type: string
                  const: file
              description: The data type of the input property
            description:
              type: string
              default: ""
              description: A short description of the input property
            required:
              type: boolean
              default: false
              description: Whether the property is required
            default:
              default: null
              description: The default value of the property - this represents the default value if none is provided
            example:
              default: null
              description: Example value used for either initialization or tooling
            enumValues:
              type: array
              items: {}
              default: []
              description: Allowed enumeration values for the property
          required:
            - name
            - kind
    description: Parameters accepted by the function tool
  strict:
    type: boolean
    default: true
    description: Indicates whether the function tool enforces strict validation on its parameters
required:
  - kind
  - parameters
allOf:
  - $ref: Tool.yaml
description: Represents a local function tool.
