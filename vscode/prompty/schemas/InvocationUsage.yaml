$schema: https://json-schema.org/draft/2020-12/schema
$id: InvocationUsage.yaml
type: object
properties:
  inputTokens:
    type: string
    description: Number of input tokens consumed by the completed invocation
  outputTokens:
    type: string
    description: Number of output tokens generated by the completed invocation
  totalTokens:
    type: string
    description: Total tokens consumed by the completed invocation
required:
  - inputTokens
  - outputTokens
  - totalTokens
description: |-
  Complete cumulative token usage for one completed model invocation.

  Providers emit this value at most once per invocation. `totalTokens` uses
  the provider total when available; otherwise the provider adapter computes
  it as `inputTokens + outputTokens`.
