name: prompty Rust build and publish

on:
  push:
    tags:
      - 'rust/*'
  workflow_dispatch:

jobs:
  test:
    uses: ./.github/workflows/prompty-rust-check.yml

  publish:
    name: publish to crates.io
    runs-on: ubuntu-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/rust/')
    permissions:
      contents: read
    defaults:
      run:
        working-directory: runtime/rust
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Extract version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#rust/}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "Publishing version: $VERSION"

      - name: Rewrite crate versions
        run: |
          # Update package versions in all crates
          for toml in prompty/Cargo.toml prompty-openai/Cargo.toml prompty-anthropic/Cargo.toml prompty-foundry/Cargo.toml; do
            sed -i "0,/^version = .*/s//version = \"$VERSION\"/" "$toml"
            echo "=== $toml ==="
            head -5 "$toml"
          done

          # Update dependency versions (prompty = { version = "...", path = "..." })
          for toml in prompty-openai/Cargo.toml prompty-anthropic/Cargo.toml prompty-foundry/Cargo.toml; do
            sed -i "s/prompty = { version = \"[^\"]*\"/prompty = { version = \"$VERSION\"/" "$toml"
            sed -i "s/prompty-openai = { version = \"[^\"]*\"/prompty-openai = { version = \"$VERSION\"/" "$toml"
          done

          # Regenerate lockfile with new versions
          cargo generate-lockfile

      - name: Verify build
        run: cargo build --workspace

      # Publish in dependency order — each crate must be available before its dependents.
      # --allow-dirty is needed because we rewrite Cargo.toml versions from the tag.
      # publish_crate helper: skips if already published, retries on index lag.
      - name: Publish crates
        run: |
          publish_crate() {
            local crate="$1"
            local version="$VERSION"

            # Check if already published (idempotent reruns)
            if cargo search "$crate" --limit 1 2>/dev/null | grep -q "\"$version\""; then
              echo "⏭️  $crate@$version already published, skipping"
              return 0
            fi

            echo "📦 Publishing $crate@$version..."
            cargo publish -p "$crate" --allow-dirty
          }

          wait_for_index() {
            local crate="$1"
            local version="$VERSION"
            echo "⏳ Waiting for $crate@$version to appear in crates.io index..."
            for i in $(seq 1 12); do
              sleep 10
              if cargo search "$crate" --limit 1 2>/dev/null | grep -q "\"$version\""; then
                echo "✅ $crate@$version is now available"
                return 0
              fi
              echo "   attempt $i/12..."
            done
            echo "⚠️  $crate@$version not yet in index after 120s, proceeding anyway"
          }

          publish_crate prompty
          wait_for_index prompty

          publish_crate prompty-openai
          wait_for_index prompty-openai

          publish_crate prompty-anthropic

          publish_crate prompty-foundry
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
