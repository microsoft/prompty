name: prompty Rust build and publish

on:
  push:
    tags:
      - 'rust/*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    uses: ./.github/workflows/prompty-rust-check.yml

  publish:
    name: publish to crates.io
    runs-on: ubuntu-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/rust/')
    permissions:
      contents: read
    defaults:
      run:
        working-directory: runtime/rust
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Verify tag matches source version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#rust/}"
          SOURCE_VERSION=$(grep '^version' prompty/Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "tag=$TAG_VERSION source=$SOURCE_VERSION"
          if [ "$TAG_VERSION" != "$SOURCE_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match source version ($SOURCE_VERSION). Run the release script to bump versions before tagging."
            exit 1
          fi
          echo "VERSION=$TAG_VERSION" >> "$GITHUB_ENV"

      - name: Verify build
        run: cargo build --workspace

      # Publish in dependency order — each crate must be available before its dependents.
      # publish_crate helper: skips if already published, retries on index lag.
      - name: Publish crates
        run: |
          publish_crate() {
            local crate="$1"
            local version="$VERSION"

            # Check if already published (idempotent reruns)
            if cargo search "$crate" --limit 1 2>/dev/null | grep -q "\"$version\""; then
              echo "⏭️  $crate@$version already published, skipping"
              return 0
            fi

            echo "📦 Publishing $crate@$version..."
            cargo publish -p "$crate"
          }

          wait_for_index() {
            local crate="$1"
            local version="$VERSION"
            echo "⏳ Waiting for $crate@$version to appear in crates.io index..."
            for i in $(seq 1 12); do
              sleep 10
              if cargo search "$crate" --limit 1 2>/dev/null | grep -q "\"$version\""; then
                echo "✅ $crate@$version is now available"
                return 0
              fi
              echo "   attempt $i/12..."
            done
            echo "⚠️  $crate@$version not yet in index after 120s, proceeding anyway"
          }

          publish_crate prompty
          wait_for_index prompty

          publish_crate prompty-openai
          wait_for_index prompty-openai

          publish_crate prompty-anthropic

          publish_crate prompty-foundry
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
