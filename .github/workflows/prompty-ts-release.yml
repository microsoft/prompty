name: TypeScript Release
on:
  push:
    tags:
      - 'typescript/*'

permissions:
  contents: read

jobs:
  test:
    uses: ./.github/workflows/prompty-ts-check.yml

  publish:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: runtime/typescript
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 24  # Ships npm 11+ natively (OIDC trusted publishing)
          registry-url: https://registry.npmjs.org

      - name: Verify tag matches source version
        id: meta
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#typescript/}"
          SOURCE_VERSION=$(node -p "require('./packages/core/package.json').version")
          echo "tag=$TAG_VERSION source=$SOURCE_VERSION"
          if [ "$TAG_VERSION" != "$SOURCE_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match source version ($SOURCE_VERSION). Run the release script to bump versions before tagging."
            exit 1
          fi
          echo "version=$TAG_VERSION" >> "$GITHUB_OUTPUT"
          if [[ "$TAG_VERSION" == *-* ]]; then
            echo "tag=alpha" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - run: npm ci
      - run: npm run build

      # Publish in dependency order — OIDC trusted publisher auth
      # Each step checks if the version already exists (idempotent reruns)
      - name: Publish @prompty/core
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          if npm view @prompty/core@$VERSION version 2>/dev/null; then
            echo "⏭️  @prompty/core@$VERSION already published, skipping"
          else
            npm publish --workspace=packages/core --access public --provenance --tag ${{ steps.meta.outputs.tag }}
          fi

      - name: Publish @prompty/openai
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          if npm view @prompty/openai@$VERSION version 2>/dev/null; then
            echo "⏭️  @prompty/openai@$VERSION already published, skipping"
          else
            npm publish --workspace=packages/openai --access public --provenance --tag ${{ steps.meta.outputs.tag }}
          fi

      - name: Publish @prompty/foundry
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          if npm view @prompty/foundry@$VERSION version 2>/dev/null; then
            echo "⏭️  @prompty/foundry@$VERSION already published, skipping"
          else
            npm publish --workspace=packages/foundry --access public --provenance --tag ${{ steps.meta.outputs.tag }}
          fi

      - name: Publish @prompty/anthropic
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          if npm view @prompty/anthropic@$VERSION version 2>/dev/null; then
            echo "⏭️  @prompty/anthropic@$VERSION already published, skipping"
          else
            npm publish --workspace=packages/anthropic --access public --provenance --tag ${{ steps.meta.outputs.tag }}
          fi
