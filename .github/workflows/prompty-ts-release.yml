name: TypeScript Release
on:
  push:
    tags:
      - 'typescript/*'

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: runtime/typescript
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22  # Must be >=22.14.0 for npm trusted publishing
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm run build
      - run: npm run test

      # Determine npm dist-tag from version
      - name: Determine dist-tag
        id: dist-tag
        run: |
          VERSION="${GITHUB_REF_NAME#typescript/}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if [[ "$VERSION" == *-* ]]; then
            echo "tag=alpha" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      # Publish in dependency order — OIDC trusted publisher auth
      - run: npm publish --workspace=packages/core --access public --tag ${{ steps.dist-tag.outputs.tag }}
      - run: npm publish --workspace=packages/openai --access public --tag ${{ steps.dist-tag.outputs.tag }}
      - run: npm publish --workspace=packages/foundry --access public --tag ${{ steps.dist-tag.outputs.tag }}
      - run: npm publish --workspace=packages/anthropic --access public --tag ${{ steps.dist-tag.outputs.tag }}
