name: prompty VSCode Extension build

on:
  push:
    tags:
      - 'vscode/*'

  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Extract version from tag
        run: |
          if [[ "$GITHUB_REF" == refs/tags/vscode/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/vscode/}"
          else
            VERSION=$(node -p "require('./vscode/prompty/package.json').version")
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "Using version: $VERSION"

      - name: Set VSIX timestamp
        run: |
          VSIX_TIMESTAMP=$(date -u +"%Y%m%d.%H%M%S")
          echo "VSIX_TIMESTAMP=$VSIX_TIMESTAMP" >> "$GITHUB_ENV"
          echo "VSIX filename timestamp: $VSIX_TIMESTAMP"

      - name: Install dependencies
        working-directory: ./vscode/prompty
        run: npm ci

      - name: Compile
        working-directory: ./vscode/prompty
        run: npm run compile

      - name: Generate Grammar
        working-directory: ./vscode/prompty
        run: npm run generate-grammar

      - name: Build
        working-directory: ./vscode/prompty
        run: npm run build

      - name: Build VSIX
        working-directory: ./vscode/prompty
        run: npm run package-pre -- "$VERSION" --no-update-package-json --out "prompty-${VSIX_TIMESTAMP}.vsix"

      - uses: actions/upload-artifact@v7
        with:
          name: prompty-vsix-${{ env.VSIX_TIMESTAMP }}
          path: ./vscode/prompty/prompty-${{ env.VSIX_TIMESTAMP }}.vsix
