name: prompty CSharp build and publish

on:
  push:
    tags:
      - 'csharp/*'
  workflow_dispatch:

jobs:
  prompty-tests:
    uses: ./.github/workflows/prompty-csharp-check.yml

  nuget-publish:
    name: publish nuget packages
    runs-on: ubuntu-latest
    needs: prompty-tests
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v5
      - name: Setup dotnet
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '9.0.x'

      - name: Verify tag matches source version
        working-directory: ./runtime/csharp
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#csharp/}"
          SOURCE_VERSION=$(grep '<Version>' Prompty.Core/Prompty.Core.csproj | sed 's/.*<Version>\(.*\)<\/Version>.*/\1/')
          echo "tag=$TAG_VERSION source=$SOURCE_VERSION"
          if [ "$TAG_VERSION" != "$SOURCE_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match source version ($SOURCE_VERSION). Run the release script to bump versions before tagging."
            exit 1
          fi
          echo "VERSION=$TAG_VERSION" >> "$GITHUB_ENV"

      - name: dotnet restore
        working-directory: ./runtime/csharp
        run: dotnet restore

      - name: dotnet pack
        working-directory: ./runtime/csharp
        run: dotnet pack --configuration Release --no-restore --output ./artifacts

      - name: NuGet login (OIDC trusted publishing)
        uses: NuGet/login@v1
        id: nuget-login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push to NuGet
        working-directory: ./runtime/csharp
        run: |
          for pkg in ./artifacts/*.nupkg; do
            dotnet nuget push "$pkg" \
              --api-key "${{ steps.nuget-login.outputs.NUGET_API_KEY }}" \
              --source https://api.nuget.org/v3/index.json \
              --skip-duplicate
          done
