name: prompty CSharp build and publish

on:
  push:
    tags:
      - 'csharp/*'
  workflow_dispatch:

jobs:
  prompty-tests:
    name: run unit tests on supported .net versions
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        dotnet-version: [ '9.0.x' ]
        os: [ubuntu-latest, macOS-latest, windows-latest]
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5
      - name: Setup dotnet ${{ matrix.dotnet-version }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ matrix.dotnet-version }}

      - name: dotnet restore
        working-directory: ./runtime/csharp
        run: dotnet restore

      - name: dotnet build
        working-directory: ./runtime/csharp
        run: dotnet build --nologo

      - name: dotnet test
        working-directory: ./runtime/csharp
        run: dotnet test --nologo --logger "console;verbosity=normal"

  nuget-publish:
    name: publish nuget packages
    runs-on: ubuntu-latest
    needs: prompty-tests
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v5
      - name: Setup dotnet
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: csharp version
        run: |
          echo "VERSION=$(echo $GITHUB_REF | sed 's/refs\/tags\/csharp\///')" >> "$GITHUB_ENV"
          echo "Using version: ${{ env.VERSION }}"

      - name: Set package versions
        id: update
        uses: vers-one/dotnet-project-version-updater@v1.7
        with:
          file: |
            ./runtime/csharp/Prompty.Core/Prompty.Core.csproj
            ./runtime/csharp/Prompty.OpenAI/Prompty.OpenAI.csproj
            ./runtime/csharp/Prompty.Foundry/Prompty.Foundry.csproj
            ./runtime/csharp/Prompty.Anthropic/Prompty.Anthropic.csproj
          version: ${{ env.VERSION }}

      - name: dotnet restore
        working-directory: ./runtime/csharp
        run: dotnet restore

      - name: dotnet build
        working-directory: ./runtime/csharp
        run: dotnet build --configuration Release --nologo

      - name: publish nuget packages
        working-directory: ./runtime/csharp
        run: |
          dotnet nuget push Prompty.Core/bin/Release/Prompty.Core.${{ env.VERSION }}.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json
          dotnet nuget push Prompty.OpenAI/bin/Release/Prompty.OpenAI.${{ env.VERSION }}.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json
          dotnet nuget push Prompty.Foundry/bin/Release/Prompty.Foundry.${{ env.VERSION }}.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json
          dotnet nuget push Prompty.Anthropic/bin/Release/Prompty.Anthropic.${{ env.VERSION }}.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json
