name: prompty VSCode Extension build and test

on:
  push:
    paths:
      - "vscode/prompty/**"
    branches:
      - "vscode/*"

  pull_request:
    paths:
      - "vscode/prompty/**"

  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

jobs:
  extension-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Install dependencies
        working-directory: ./vscode/prompty
        run: npm ci

      - name: Compile
        working-directory: ./vscode/prompty
        run: npm run compile

      - name: Generate Grammar
        working-directory: ./vscode/prompty
        run: npm run generate-grammar

      - name: Build
        working-directory: ./vscode/prompty
        run: npm run build
