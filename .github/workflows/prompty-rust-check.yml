name: prompty Rust build and test
on:
  pull_request:
    paths:
      - 'runtime/rust/**'

  workflow_call:

jobs:
  rust-tests:
    name: test rust on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    permissions:
      contents: read
    defaults:
      run:
        working-directory: runtime/rust
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            runtime/rust/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('runtime/rust/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build workspace
        run: cargo build --workspace

      - name: Check packaged crates without dev features
        run: |
          cargo check -p prompty --lib --no-default-features
          cargo check -p prompty-openai --lib --no-default-features
          cargo check -p prompty-anthropic --lib --no-default-features
          cargo check -p prompty-foundry --lib --no-default-features

      - name: Run tests
        run: cargo test --workspace

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy lints
        run: cargo clippy --workspace -- -D warnings
