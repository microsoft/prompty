name: prompty Rust build and test
on:
  pull_request:
    paths:
      - 'runtime/rust/**'
      - '.github/workflows/prompty-rust-check.yml'

  workflow_call:

jobs:
  rust-tests:
    name: test Rust ${{ matrix.toolchain }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        toolchain: [stable, "1.85"]
    permissions:
      contents: read
    defaults:
      run:
        working-directory: runtime/rust
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}
          components: rustfmt, clippy

      - name: Cache cargo registry & build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            runtime/rust/target
          key: ${{ runner.os }}-${{ matrix.toolchain }}-cargo-${{ hashFiles('runtime/rust/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.toolchain }}-cargo-

      - name: Build workspace
        run: cargo build --workspace

      - name: Check packaged crates without dev features
        run: |
          cargo check -p prompty --lib --no-default-features
          cargo check -p prompty-openai --lib --no-default-features
          cargo check -p prompty-anthropic --lib --no-default-features
          cargo check -p prompty-foundry --lib --no-default-features

      - name: Run tests
        run: cargo test --workspace

      - name: Test OpenTelemetry feature
        run: cargo test -p prompty --features otel

      - name: Check formatting
        if: matrix.toolchain == '1.85'
        run: cargo fmt --all -- --check

      - name: Clippy lints
        run: cargo clippy --workspace -- -D warnings
