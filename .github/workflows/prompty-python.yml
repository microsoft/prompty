name: prompty Python build and publish

on:
  push:
    tags:
      - 'python/2.*'
  workflow_dispatch:

env:
  AZURE_OPENAI_ENDPOINT: https://fake
  AZURE_OPENAI_KEY: 12342323433

jobs:
  prompty-v2-tests:
    name: test python v2 on ${{ matrix.os }} / py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12', '3.13']
        os: [ubuntu-latest, macOS-latest, windows-latest]
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        working-directory: ./runtime/python/prompty
        run: uv pip install --system -e '.[dev,all]'

      - name: Lint with ruff
        working-directory: ./runtime/python/prompty
        run: ruff check .

      - name: Check formatting with ruff
        working-directory: ./runtime/python/prompty
        run: ruff format --check .

      - name: Run tests
        working-directory: ./runtime/python/prompty
        run: python -m pytest tests/ -q --tb=short --cov=prompty --cov-report=term --cov-report=json

  pypi-publish:
    name: upload release to PyPI
    runs-on: ubuntu-latest
    needs: prompty-v2-tests
    if: startsWith(github.ref, 'refs/tags/python/2.')

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        run: |
          VERSION=$(echo "$GITHUB_REF" | sed 's|refs/tags/python/||')
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "Publishing version: $VERSION"

      - name: Rewrite version
        working-directory: ./runtime/python/prompty
        run: |
          echo "VERSION = \"$VERSION\"" > ./prompty/_version.py
          cat ./prompty/_version.py

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        working-directory: ./runtime/python/prompty
        run: uv pip install --system -e '.[dev,all]'

      - name: Run tests
        working-directory: ./runtime/python/prompty
        run: python -m pytest tests/ -q --tb=short --cov=prompty --cov-report=term

      - name: Build package
        working-directory: ./runtime/python/prompty
        run: |
          uv pip install --system flit
          flit build --format wheel
          flit build --format sdist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: ./runtime/python/prompty/dist
