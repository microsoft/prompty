name: prompty Python build and publish

on:
  push:
    tags:
      - 'python/2.*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    uses: ./.github/workflows/prompty-python-check.yml

  pypi-publish:
    name: upload release to PyPI
    runs-on: ubuntu-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/python/2.')

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v5

      - name: Verify tag matches source version
        working-directory: ./runtime/python/prompty
        run: |
          TAG_VERSION=$(echo "$GITHUB_REF" | sed 's|refs/tags/python/||')
          SOURCE_VERSION=$(python3 -c "exec(open('./prompty/_version.py').read()); print(VERSION)")
          echo "tag=$TAG_VERSION source=$SOURCE_VERSION"
          if [ "$TAG_VERSION" != "$SOURCE_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match source version ($SOURCE_VERSION). Run the release script to bump versions before tagging."
            exit 1
          fi
          echo "VERSION=$TAG_VERSION" >> "$GITHUB_ENV"

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v8

      - name: Install dependencies
        working-directory: ./runtime/python/prompty
        run: uv pip install --system -e '.[dev,all]'

      - name: Build package
        working-directory: ./runtime/python/prompty
        run: |
          uv pip install --system flit
          flit build --format wheel
          flit build --format sdist

      - name: Check if already published
        id: check
        run: |
          if pip index versions prompty 2>/dev/null | grep -q "$VERSION"; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "⏭️  prompty==$VERSION already on PyPI, skipping"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to PyPI
        if: steps.check.outputs.skip != 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: ./runtime/python/prompty/dist
