name: prompty Python build and publish

on:
  push:
    tags:
      - 'python/2.*'
  workflow_dispatch:

jobs:
  test:
    uses: ./.github/workflows/prompty-python-check.yml

  pypi-publish:
    name: upload release to PyPI
    runs-on: ubuntu-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/python/2.')

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v5

      - name: Extract version from tag
        run: |
          VERSION=$(echo "$GITHUB_REF" | sed 's|refs/tags/python/||')
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "Publishing version: $VERSION"

      - name: Rewrite version
        working-directory: ./runtime/python/prompty
        run: |
          echo "VERSION = \"$VERSION\"" > ./prompty/_version.py
          cat ./prompty/_version.py

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        working-directory: ./runtime/python/prompty
        run: uv pip install --system -e '.[dev,all]'

      - name: Build package
        working-directory: ./runtime/python/prompty
        run: |
          uv pip install --system flit
          flit build --format wheel
          flit build --format sdist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: ./runtime/python/prompty/dist
